version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dronsag_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dronsag
      MYSQL_USER: dronsag_user
      MYSQL_PASSWORD: dronsag_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dronsag/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dronsag_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dronsag_phpmyadmin
    depends_on:
      - mysql
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: dronsag_user
      PMA_PASSWORD: dronsag_password
    networks:
      - dronsag_network

  backend:
    build: ./dronsag/backend
    container_name: dronsag_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: dronsag_user
      DB_PASSWORD: dronsag_password
      DB_NAME: dronsag
      JWT_SECRET: your_super_secret_key_change_this
    volumes:
      - ./dronsag/backend:/app
      - /app/node_modules
      - ./uploads:/uploads
    networks:
      - dronsag_network

  frontend:
    build: ./dronsag/frontend
    container_name: dronsag_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./dronsag/frontend:/app
      - /app/node_modules
    networks:
      - dronsag_network

volumes:
  mysql_data:

networks:
  dronsag_network:
    driver: bridge